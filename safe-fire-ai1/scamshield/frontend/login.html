<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScamShield AI — Sign In</title>
  <link rel="stylesheet" href="static/style.css"/>
  <link rel="stylesheet" href="static/login.css"/>
</head>
<body class="auth-body">

  <div class="auth-container">
    <!-- Logo -->
    <div class="auth-logo">
      <span class="logo-icon">🛡️</span>
      <div>
        <div class="logo-text">ScamShield <span class="logo-ai">AI</span></div>
        <div class="logo-tagline">Pehla Kadam, Surakshit Kadam</div>
      </div>
    </div>

    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Sign in to access your safety dashboard and scam reports.</p>

    <!-- Google Login -->
    <button class="google-btn" onclick="loginWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 48 48" style="flex-shrink:0">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </button>

    <div class="auth-divider"><span>or</span></div>

    <!-- Mobile OTP -->
    <div class="otp-section" id="otp-section">
      <!-- Step 1: Phone input -->
      <div id="step-phone">
        <label class="input-label">Mobile Number</label>
        <div class="phone-input-wrap">
          <span class="phone-prefix">🇮🇳 +91</span>
          <input id="phone-input" type="tel" maxlength="10" placeholder="Enter 10-digit number"
                 oninput="this.value=this.value.replace(/\D/g,'')"
                 onkeydown="if(event.key==='Enter') sendOTP()"/>
        </div>
        <button class="otp-btn" onclick="sendOTP()" id="send-otp-btn">
          <span id="send-btn-text">Send OTP</span>
          <span id="send-btn-loader" class="hidden">Sending...</span>
        </button>
      </div>

      <!-- Step 2: OTP verify -->
      <div id="step-otp" class="hidden">
        <div class="otp-sent-msg" id="otp-sent-msg"></div>
        <label class="input-label">Enter OTP</label>
        <div class="otp-boxes" id="otp-boxes">
          <input class="otp-box" type="tel" maxlength="1" oninput="otpInput(this,0)" onkeydown="otpKey(event,0)"/>
          <input class="otp-box" type="tel" maxlength="1" oninput="otpInput(this,1)" onkeydown="otpKey(event,1)"/>
          <input class="otp-box" type="tel" maxlength="1" oninput="otpInput(this,2)" onkeydown="otpKey(event,2)"/>
          <input class="otp-box" type="tel" maxlength="1" oninput="otpInput(this,3)" onkeydown="otpKey(event,3)"/>
          <input class="otp-box" type="tel" maxlength="1" oninput="otpInput(this,4)" onkeydown="otpKey(event,4)"/>
          <input class="otp-box" type="tel" maxlength="1" oninput="otpInput(this,5)" onkeydown="otpKey(event,5)"/>
        </div>
        <button class="otp-btn" onclick="verifyOTP()" id="verify-btn">
          <span id="verify-btn-text">Verify & Sign In</span>
          <span id="verify-btn-loader" class="hidden">Verifying...</span>
        </button>
        <div class="resend-row">
          <span id="resend-timer" class="resend-timer"></span>
          <button id="resend-btn" class="resend-link hidden" onclick="resendOTP()">Resend OTP</button>
        </div>
        <button class="back-link" onclick="goBack()">← Change number</button>
      </div>
    </div>

    <!-- Error / success messages -->
    <div id="auth-error" class="auth-msg error hidden"></div>
    <div id="auth-success" class="auth-msg success hidden"></div>

    <p class="auth-footer">
      By signing in you agree to our
      <a href="https://cybercrime.gov.in" target="_blank">Terms</a>.
      ScamShield AI is free for students and job seekers.
    </p>
  </div>

  <script src="static/login.js"></script>
</body>
</html>
